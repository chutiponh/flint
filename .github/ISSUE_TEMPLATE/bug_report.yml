name: Bug report
description: Something in Flint isn't working right
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug! Please fill out the details below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
      placeholder: When I paste X into the JSON tool, it...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Flint
        2. ...
    validations:
      required: true
  - type: input
    id: flint-version
    attributes:
      label: Flint version
      description: Menubar icon → About, or the DMG filename.
    validations:
      required: true
  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: e.g. 14.5 (Sonoma)
    validations:
      required: true
